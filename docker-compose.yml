# Docker Compose for local development. Runs MongoDB, the dashboard API, and Selenium.
services:
  sample-api:
    build: ./sample-api
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongo:
    image: mongo:7.0
    container_name: qa_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: qa_platform
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change-me}
    volumes:
      - ./data/mongo:/data/db
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongo-seeder:
    image: node:20-alpine
    volumes:
      - ./scripts:/scripts
    command: sh -c "npm ci --prefix /scripts && node /scripts/seed-mongo.js"
    environment:
      - MONGO_URI=mongodb://mongo:27017/qa_platform
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  dashboard-api:
    image: node:20-alpine
    container_name: qa_dashboard_api
    working_dir: /workspace/dashboard-api
    depends_on:
      - mongo
    environment:
      MONGO_DB_NAME: qa_platform
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USERNAME: ${MONGO_USERNAME:-qa_platform_app}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-change-me}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-qa_platform}
      PORT: 3001
    volumes:
      - ./:/workspace
    ports:
      - "3001:3001"
    command: sh -c "npm ci && node server.js"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  selenium:
    image: selenium/standalone-chrome:4.20.0
    container_name: qa_selenium
    ports:
      - "4444:4444"
    environment:
      SE_NODE_MAX_INSTANCES: 1
      SE_NODE_MAX_SESSIONS: 1

