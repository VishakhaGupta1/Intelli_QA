services:
  - type: web
    name: intelliqa-dashboard-api
    runtime: node
    rootDir: dashboard-api
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: intelliqa-sample-api
    runtime: node
    rootDir: sample-api
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 4000