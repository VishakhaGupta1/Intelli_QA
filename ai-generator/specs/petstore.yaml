openapi: 3.0.0
info:
  title: Petstore API
  version: 1.0.0
  description: Self-contained OpenAPI spec for a pet management API.
servers:
  - url: https://petstore.swagger.io/v2
paths:
  /pet/{petId}:
    get:
      summary: Get pet by ID
      tags:
        - pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
                  status:
                    type: string
                required:
                  - id
                  - name
                  - status
        '400':
          description: Invalid pet ID supplied
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                required:
                  - code
                  - message
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                required:
                  - code
                  - message
    delete:
      summary: Delete pet by ID
      tags:
        - pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Pet deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                required:
                  - code
                  - message
        '400':
          description: Invalid pet ID supplied
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                required:
                  - code
                  - message
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                required:
                  - code
                  - message
  /pet:
    post:
      summary: Add a new pet
      tags:
        - pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  format: int64
                name:
                  type: string
                category:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                photoUrls:
                  type: array
                  items:
                    type: string
                    format: uri
                tags:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                status:
                  type: string
                  enum:
                    - available
                    - pending
                    - sold
              required:
                - name
                - photoUrls
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
                  status:
                    type: string
                required:
                  - id
                  - name
                  - status
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                required:
                  - code
                  - message
    put:
      summary: Update an existing pet
      tags:
        - pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  format: int64
                name:
                  type: string
                category:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                photoUrls:
                  type: array
                  items:
                    type: string
                    format: uri
                tags:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                status:
                  type: string
                  enum:
                    - available
                    - pending
                    - sold
              required:
                - id
                - name
                - photoUrls
      responses:
        '200':
          description: Pet updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
                  status:
                    type: string
                required:
                  - id
                  - name
                  - status
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                required:
                  - code
                  - message
  /pet/findByStatus:
    get:
      summary: Find pets by status
      tags:
        - pet
      parameters:
        - name: status
          in: query
          required: true
          schema:
            type: string
            enum:
              - available
              - pending
              - sold
      responses:
        '200':
          description: Matching pets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      format: int64
                    name:
                      type: string
                    status:
                      type: string
                  required:
                    - id
                    - name
                    - status
        '400':
          description: Invalid status value
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                required:
                  - code
                  - message
